version: '3.8'

services:
  # Backend API
  backend:
    build: .
    container_name: ai_ops_backend
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
      - ./memory:/app/memory
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - ai_ops_network

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_ops_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ai_ops_network

  # Redis (for caching)
  redis:
    image: redis:7-alpine
    container_name: ai_ops_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ai_ops_network

volumes:
  redis_data:

networks:
  ai_ops_network:
    driver: bridge